<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PAGE_TITLE}}</title>
    <!-- Pretendard 폰트 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <!-- Chart.js (오프라인 지원용 로컬 삽입) -->
    <script>{{CHART_JS}}</script>
    <script>{{DATALABELS_JS}}</script>
    <style>
        :root {
            --primary-color: #3B82F6;
            --border-color: #E5E7EB;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --bg-gray: #F9FAFB;
        }
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: #f3f4f6;
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
        }
        .dashboard-container {
            max-width: 1200px;
            width: 100%;
            box-sizing: border-box;
            margin: 0 auto;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 40px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        .title-area h1 {
            margin: 0;
            font-size: 24px;
            color: #1a365d;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .meta-area {
            text-align: right;
            font-size: 16px;
            color: #4b5563;
            line-height: 1.5;
        }
        .meta-area span {
            color: #9ca3af;
        }
        
        /* 안내 박스 (주요사항) */
        .notice-box {
            background-color: #F8FAF2;
            border: 1px solid #D1E5CF;
            border-radius: 8px;
            padding: 20px 25px;
            margin-bottom: 30px;
        }
        .notice-box ul {
            margin: 0;
            padding-left: 20px;
            color: #374151;
            line-height: 1.6;
        }
        .notice-box li::marker {
            color: #10B981;
        }
        
        /* 섹션 타이틀 */
        .section-title {
            font-size: 16px;
            font-weight: 700;
            margin: 40px 0 20px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::before {
            content: '';
            display: block;
            width: 4px;
            height: 20px;
            background-color: #60a5fa;
            border-radius: 2px;
        }

        /* 차트 영역 */
        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }
        .chart-card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            background: white;
            position: relative;
            min-width: 0; /* Safari Grid Canvas fix */
        }
        .chart-title {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 20px;
        }
        .chart-legend-info {
            font-size: 12px;
            font-weight: normal;
            color: #6B7280;
        }
        .chart-container-inner {
            position: relative;
            width: 100%;
            height: auto;
        }

        /* 테이블 영역 */
        .table-container {
            overflow-x: auto;
            margin-bottom: 40px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }
        .report-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            text-align: center;
        }
        .report-table th, .report-table td {
            border: 1px solid var(--border-color);
            padding: 10px 8px;
        }
        .report-table th {
            background-color: var(--bg-gray);
            color: #374151;
            font-weight: 600;
        }
        .report-table .cat-cell {
            font-weight: 600;
            color: #4b5563;
        }
        .report-table .num-cell {
            text-align: right;
            padding-right: 12px;
        }

        /* 메모 그리드 영역 */
        .memo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .memo-card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: white;
            display: flex;
            flex-direction: column;
            min-height: 120px;
        }
        .memo-card-title {
            background-color: var(--bg-gray);
            padding: 10px 15px;
            font-weight: 600;
            font-size: 14px;
            color: #1e3a8a;
            border-bottom: 1px solid var(--border-color);
            border-radius: 8px 8px 0 0;
        }
        .memo-card-content {
            padding: 15px;
            font-size: 13px;
            color: #4b5563;
            flex-grow: 1;
            line-height: 1.5;
        }
        
        /* 커스텀 범례 영역 */
        .custom-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 15px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .legend-item {
            display: flex;
            align-items: center;
            font-size: 13px;
            color: #4b5563;
        }
        .color-box {
            width: 12px;
            height: 12px;
            border-radius: 4px;
            margin-right: 6px;
            display: inline-block;
        }
        
        /* 모바일 대응 (반응형) */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .dashboard-container {
                padding: 15px;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .meta-area {
                text-align: left;
            }
            .chart-grid {
                grid-template-columns: 1fr;
            }
            .memo-grid {
                grid-template-columns: 1fr;
            }
            .chart-container-inner {
                height: auto;
            }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <!-- Header -->
    <div class="header">
        <div class="title-area">
            <h1>📋 지원업무 모니터링 통합 업무대시보드</h1>
        </div>
        <div class="meta-area">
            <span>보고일자:</span> {{REPORT_DATE}}<br>
            <span>작성부서:</span> 의무기록팀
        </div>
    </div>

    <!-- 공통 주요사항 -->
    <div class="notice-box">
        <ul>
            {{MEMO_CONTENT}}
        </ul>
    </div>


    <!-- 업무별 차트 영역 -->
    <div class="section-title">업무별 실적 분석 (일계 vs 누계 합계)</div>
    <div class="chart-grid">
        <div class="chart-card">
            <div class="chart-title">
                <div>📅 업무별 금일 업무 합계 (일계)</div>
            </div>
            <div class="chart-container-inner">
                {{TASK_DAILY_B64}}
                <canvas id="taskDailyChart" style="display:none;"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <div class="chart-title">
                <div>📈 업무별 누적 작업 합계</div>
            </div>
            <div class="chart-container-inner">
                {{TASK_MONTHLY_B64}}
                <canvas id="taskMonthlyChart" style="display:none;"></canvas>
            </div>
        </div>
    </div>

    <!-- 누적 추이 차트 영역 -->
    <div class="section-title">업무별 실적 누적 추이</div>
    <div class="chart-card" style="margin-bottom: 40px;">
        <div class="chart-title">
            <div>📈 누적 추이</div>
        </div>
        <div class="chart-container-inner">
            {{TREND_B64}}
            <canvas id="trendChart" style="display:none;"></canvas>
        </div>
    </div>

    <!-- 그외 업무 진행사항 -->
    <div class="section-title">담당자별 그외 업무 진행사항</div>
    <div class="memo-grid">
        {{OTHER_PROGRESS_HTML}}
    </div>

    <!-- 테이블 영역 -->
    <div class="section-title">개별 업무 상세 실적 현황 (일계/누계 통합형)</div>
    <div class="table-container">
        {{TABLE_HTML}}
    </div>


</div>

<script>
    if (typeof Chart !== 'undefined') {{STAFF_LIST_JSON}};
        const taskLabels = {{TASK_LABELS_JSON}};
        


    // 업무별 일계 차트
    const ctxTaskDaily = document.getElementById('taskDailyChart').getContext('2d');
    new Chart(ctxTaskDaily, {{TASK_DAILY_CHART_JSON}}
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                datalabels: {
                    color: '#4b5563',
                    anchor: 'end',
                    align: 'top',
                    font: { weight: 'bold', size: 16 },
                    formatter: function(value, context) {
                        if (!value || value === 0) return '';
                        return value + '건';
                    }
                }
            },
            scales: {
                x: { grid: { display: false }, ticks: { font: { size: 15 } } },
                y: { beginAtZero: true, ticks: { font: { size: 15 } } }
            },
            layout: {
                padding: { top: 20 }
            }
        }
    });

    // 업무별 누계 차트
    const ctxTaskMonthly = document.getElementById('taskMonthlyChart').getContext('2d');
    new Chart(ctxTaskMonthly, {{TASK_MONTHLY_CHART_JSON}}
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                datalabels: {
                    color: '#4b5563',
                    anchor: 'end',
                    align: 'top',
                    font: { weight: 'bold', size: 16 },
                    formatter: function(value, context) {
                        if (!value || value === 0) return '';
                        return value.toLocaleString() + '건';
                    }
                }
            },
            scales: {
                x: { grid: { display: false }, ticks: { font: { size: 15 } } },
                y: { beginAtZero: true, ticks: { font: { size: 15 } } }
            },
            layout: {
                padding: { top: 20 }
            }
        }
    });

    // 누적 추이 차트
    const ctxTrend = document.getElementById('trendChart').getContext('2d');
    new Chart(ctxTrend, {{TREND_CHART_JSON}}
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'top' },
                datalabels: { display: false }
            },
            scales: {
                x: { grid: { display: false }, ticks: { font: { size: 15 } } },
                y: { beginAtZero: true, ticks: { font: { size: 15 } } }
            },
            layout: {
                padding: { top: 20 }
            }
        }
    });
    }
</script>
</body>
</html>
