name: Build EXE from cmc_work_log

on:
  push:
    branches: [ "main" ] # 사용하는 기본 브랜치 이름이 master라면 "master"로 변경하세요.

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 3.10 등 개발하신 파이썬 버전에 맞게 조정 가능합니다.

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # discharge_analysis.py에서 pandas, numpy 등을 쓴다면 여기에 꼭 적어주세요.
        # 예시: pip install pandas openpyxl
        # requirements.txt 파일이 있다면 아래 주석을 해제하여 사용합니다.
        # pip install -r requirements.txt

    - name: Build with PyInstaller
      # 메인 파일명 적용 완료
      # CLI 환경(검은색 터미널) 결과 출력이 필요한 분석 프로그램이라면 --noconsole 옵션을 지워주세요.
      run: pyinstaller --onefile --noconsole discharge_analysis.py 

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: discharge_analysis_exe
        path: dist/*.exe
