name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # requirements.txt 파일 부재로 인한 에러를 막기 위해 캐시 옵션(cache: 'pip') 제외

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pandas tkcalendar xlsxwriter

      - name: exe 빌드
        # PATH 환경 변수 꼬임 문제를 피하기 위해 'python -m PyInstaller' 명령어로 확실하게 실행
        run: python -m PyInstaller --onefile --windowed discharge_analysis.py

      - name: 빌드 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: work_log_DA
          path: dist/*.exe
