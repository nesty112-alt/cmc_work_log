name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # 빌드 속도 향상을 위해 pip 캐시 적용 (공식 권장 사항)

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install pandas tkcalendar xlsxwriter

      - name: exe 빌드
        # 대상 파일을 main.py에서 discharge_analysis.py로 변경
        run: pyinstaller --onefile --windowed discharge_analysis.py

      - name: 빌드 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe
