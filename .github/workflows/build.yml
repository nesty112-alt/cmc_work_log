name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 소스코드 가져오기 (Checkout)
      uses: actions/checkout@v4

    - name: Python 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' 

    - name: 필수 라이브러리 및 PyInstaller 설치
      run: |
        python -m pip install --upgrade pip
        pip install pandas tkcalendar
        pip install pyinstaller

    - name: exe 파일 빌드 (PyInstaller)
      run: |
        pyinstaller --noconfirm --onefile --windowed discharge_analysis.py

    - name: 빌드된 exe 파일 업로드 (Artifacts)
      uses: actions/upload-artifact@v4
      with:
        name: WorkLogApp_Windows_EXE
        path: dist/discharge_analysis.exe
