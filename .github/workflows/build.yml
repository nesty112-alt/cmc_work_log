name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install pyinstaller pyautogui pyperclip pillow pystray opencv-python pywin32 tkcalendar pywinauto

      - name: exe 빌드
        run: pyinstaller --onefile --windowed main.py

      - name: 빌드 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe
