name: Build Windows Executable

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build Program Directory with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed --icon="static/app_icon.ico" --add-data "static;static" --hidden-import=xlsxwriter --hidden-import=openpyxl --name "IRDA log" main.py

    - name: Upload Program Folder Artifact
      uses: actions/upload-artifact@v4
      with:
        name: discharge_analysis_program
        path: dist/IRDA log/
