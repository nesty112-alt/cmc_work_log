name: Build Windows Executable

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build Standalone EXE with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "discharge_analysis" discharge_analysis.py

    - name: Upload Standalone EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: discharge_analysis_exe
        path: dist/discharge_analysis.exe
