name: Build Windows Executable

# 코드가 main 브랜치에 push될 때마다 자동으로 실행되도록 설정
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # 수동으로도 실행할 수 있도록 버튼 추가

jobs:
  build:
    # 윈도우 환경에서 빌드 진행
    runs-on: windows-latest

    steps:
    # 1. GitHub 저장소의 코드 가져오기
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Python 환경 설정 (버전은 프로젝트에 맞게 수정하세요)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' 

    # 3. 필요한 라이브러리 및 PyInstaller 설치
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    # 4. PyInstaller로 exe 빌드 (메인 실행 파일 이름을 변경해 주세요)
    - name: Build with PyInstaller
      run: |
        pyinstaller --onedir --windowed html_export.py
        # --onedir: 폴더 형태로 여러 파일과 함께 생성 (단일 파일은 --onefile 사용)
        # --windowed: 콘솔(검은 창)을 띄우지 않는 GUI 프로그램인 경우 사용

    # 5. 빌드된 결과물을 GitHub Actions에 업로드 (다운로드 가능하게 만들기)
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-App-Build
        path: dist/
